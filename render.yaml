services:
  - type: web
    name: premier-ai-encyclopedia
    env: docker
    # No buildCommand needed for Docker
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: faiss-storage
      mountPath: /app/backend/data
      sizeGB: 1
